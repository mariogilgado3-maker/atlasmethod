  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FAFAF7; color: #0F1A2E; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  ::selection { background: #0F1A2E; color: #FAFAF7; }
  button:focus, input:focus, textarea:focus { outline: none; }
  input::placeholder, textarea::placeholder { color: rgba(250,250,247,0.4); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-2px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* scrollbar in chat */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(15,26,46,0.14); border-radius: 999px; }
  html { scroll-behavior: smooth; }
  /* splash screen — pure HTML/CSS, visible at millisecond zero */
  #splash {
    position: fixed; inset: 0; z-index: 10000;
    background: #0F1A2E;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px;
    opacity: 1; transition: opacity .3s ease;
  }
  #splash.splash-hide { opacity: 0; pointer-events: none; }
  #splash svg {
    width: clamp(96px, 22vw, 160px); height: clamp(96px, 22vw, 160px);
    animation: splashIn .7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  #splash .splash-wordmark {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: clamp(14px, 3.5vw, 22px); font-weight: 700;
    color: rgba(250,250,247,0.82);
    letter-spacing: 7px; text-indent: 7px; /* compensate last letter's tracking */
    animation: splashIn .7s cubic-bezier(0.22, 1, 0.36, 1) .12s both;
  }
  /* Real phones: the width=1200 layout viewport is scaled down ~3× on a
     ~390px-wide device, shrinking px-bound sizes. When the device is narrow
     but the layout is wide, compensate so the visual size matches intent. */
  @media (max-device-width: 700px) and (min-width: 1000px) {
    #splash { gap: 64px; }
    #splash svg { width: clamp(288px, 40vw, 520px); height: clamp(288px, 40vw, 520px); }
    #splash .splash-wordmark { font-size: clamp(42px, 3.5vw, 66px); letter-spacing: 21px; text-indent: 21px; }
  }
  @keyframes splashIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }
  /* offline bar */
  #offline-bar {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
    background: #0F1A2E; color: rgba(250,250,247,0.75);
    font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 500;
    text-align: center; padding: 7px 16px; letter-spacing: 0.1px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  body.offline #offline-bar { display: block; }
</style>

<script>
/* ── Splash screen removal ──────────────────────────────────────────
   Hide once React has mounted (#root has children), respecting a
   ~600ms minimum display so fast loads don't flash, with a 6s safety
   timeout so a failed mount never traps the user behind the overlay. */
(function () {
  var MIN_SHOW = 600, FADE = 320, SAFETY = 6000;
  var splash = document.getElementById('splash');
  if (!splash) return;
  var hidden = false;

  function hide() {
    if (hidden) return;
    hidden = true;
    var elapsed = Date.now() - (window.__splashStart || 0);
    var wait = Math.max(0, MIN_SHOW - elapsed);
    setTimeout(function () {
      splash.classList.add('splash-hide');
      setTimeout(function () {
        if (splash.parentNode) splash.parentNode.removeChild(splash);
      }, FADE);
    }, wait);
  }

  var poll = setInterval(function () {
    if (document.querySelector('#root > *')) { clearInterval(poll); hide(); }
  }, 50);
  setTimeout(function () { clearInterval(poll); hide(); }, SAFETY);
})();

/* ── Service Worker registration ─────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(function (reg) {
        // When a new SW is waiting, reload to activate it immediately.
        reg.addEventListener('updatefound', function () {
          var newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', function () {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // New content available; reload so users get the latest version.
              window.location.reload();
            }
          });
        });
      })
      .catch(function (err) {
        console.warn('[SW] registration failed:', err);
      });
  });
}

/* ── Offline indicator ──────────────────────────────────────────── */
(function () {
  function sync() {
    document.body.classList.toggle('offline', !navigator.onLine);
  }
  window.addEventListener('online',  sync);
  window.addEventListener('offline', sync);
  sync();
})();
</script>
