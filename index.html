<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<title>Atlas Method — Datos. Decisiones. Rendimiento.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FAFAF7; color: #0F1A2E; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  ::selection { background: #0F1A2E; color: #FAFAF7; }
  button:focus, input:focus, textarea:focus { outline: none; }
  input::placeholder, textarea::placeholder { color: rgba(250,250,247,0.4); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-2px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* scrollbar in chat */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(15,26,46,0.14); border-radius: 999px; }
  html { scroll-behavior: smooth; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- Supabase JS v2 -->

<script>
  window.ATLAS_SUPABASE_URL = 'YOUR_SUPABASE_URL';
  window.ATLAS_SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="web/services/supabase.jsx"></script>
<script type="text/babel" src="web/core/store.jsx"></script>
<script type="text/babel" src="web/core/auth-store.jsx"></script>
<script type="text/babel" src="web/core/shell.jsx"></script>
<script type="text/babel" src="web/components/shell.jsx"></script>
<script type="text/babel" src="web/sections/hero.jsx"></script>
<script type="text/babel" src="web/sections/method.jsx"></script>
<script type="text/babel" src="web/sections/lab.jsx"></script>
<script type="text/babel" src="web/services/exercises.jsx"></script>
<script type="text/babel" src="web/services/exercise-media.jsx"></script>
<script src="web/services/workoutSession.js"></script>
<script src="web/services/atlasProgressionEngine.js"></script>
<script type="text/babel" src="web/sections/builder.jsx"></script>
<script type="text/babel" src="web/sections/dashboard.jsx"></script>
<script type="text/babel" src="web/sections/coach.jsx"></script>
<script type="text/babel" src="web/sections/atlas-coach.jsx"></script>
<script type="text/babel" src="web/sections/mobile.jsx"></script>
<script type="text/babel" src="web/sections/closing.jsx"></script>
<script type="text/babel" src="web/services/articles.jsx"></script>
<script type="text/babel" src="web/sections/aula.jsx"></script>
<script type="text/babel" src="web/sections/aula-admin.jsx"></script>
<script type="text/babel" src="web/sections/laboratorio.jsx"></script>
<script type="text/babel" src="web/sections/gems-store.jsx"></script>
<script type="text/babel" src="web/sections/auth.jsx"></script>
<script type="text/babel" src="web/sections/onboarding.jsx"></script>
<script type="text/babel" src="web/sections/workout-player.jsx"></script>
<script type="text/babel" src="web/sections/progreso.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

function HomePage() {
  return (
    <>
      <Hero />
      <MethodSection />
      <MobileSection />
      <ClosingSection />
    </>
  );
}

function AulaPage()        { return <AulaSection />; }
function CoachPage()       { return <AtlasCoachSection />; }
function LaboratorioPage() { return <AtlasCoachSection />; }
function BuilderPage()     { return <BuilderSection />; }
function PerfilPage()      { return <><DashboardSection /><GemsStoreSection /></>; }
function AdminPage()       { return <AulaAdminSection />; }
function PlayerPage()      { return <WorkoutPlayerSection />; }
function ProgresoPage()    { return <ProgresoSection />; }

function Routes() {
  const { route } = useRoute();
  const Page = {
    '/': HomePage,
    '/aula': AulaPage,
    '/coach': CoachPage,
    '/laboratorio': LaboratorioPage,
    '/builder': BuilderPage,
    '/perfil': PerfilPage,
    '/admin': AdminPage,
    '/player': PlayerPage,
    '/progreso': ProgresoPage,
  }[route] || HomePage;

  return (
    <PageTransition routeKey={route}>
      <Page />
    </PageTransition>
  );
}

function AtlasLoader() {
  return (
    <div style={{ minHeight: '100vh', background: '#060D18', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ width: 32, height: 32, border: '2px solid rgba(255,255,255,0.15)', borderTopColor: '#3B82F6', borderRadius: '50%', animation: 'spin 0.7s linear infinite' }} />
    </div>
  );
}

function AppRoot() {
  const { user, profile, loading } = useAuth();
  if (loading) return <AtlasLoader />;
  if (!user) return <AuthSection />;
  if (!profile?.onboarded) return <OnboardingSection />;
  return (
    <>
      <AppNav />
      <Routes />
      <Footer />
    </>
  );
}

function App() {
  return (
    <StoreProvider>
      <AuthProvider>
        <AppRoot />
      </AuthProvider>
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
