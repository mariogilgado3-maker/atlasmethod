<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FAFAF7; color: #0F1A2E; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  ::selection { background: #0F1A2E; color: #FAFAF7; }
  button:focus, input:focus, textarea:focus { outline: none; }
  input::placeholder, textarea::placeholder { color: rgba(250,250,247,0.4); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-2px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* scrollbar in chat */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(15,26,46,0.14); border-radius: 999px; }
  html { scroll-behavior: smooth; }
</style>

</head>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

function HomePage() {
  return (
    <>
      <Hero />
      <MethodSection />
      <MobileSection />
      <ClosingSection />
    </>
  );
}

function AulaPage()        { return <AulaSection />; }
function LaboratorioPage() { return <LaboratorioSection />; }
function BuilderPage()     { return <BuilderSection />; }
function PerfilPage()      { return <><DashboardSection /><GemsStoreSection /></>; }
function AdminPage()       { return <AulaAdminSection />; }

function Routes() {
  const { route } = useRoute();
  const Page = {
    '/': HomePage,
    '/aula': AulaPage,
    '/laboratorio': LaboratorioPage,
    '/builder': BuilderPage,
    '/perfil': PerfilPage,
    '/admin': AdminPage,
  }[route] || HomePage;

  return (
    <PageTransition routeKey={route}>
      <Page />
    </PageTransition>
  );
}

function App() {
  return (
    <StoreProvider>
      <AppNav />
      <Routes />
      <Footer />
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
